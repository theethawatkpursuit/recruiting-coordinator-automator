<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecruitFlow — Reports</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="sidebar"></nav>

  <main class="content">
    <header class="page-header">
      <h1>Reports</h1>
      <p>Pipeline health, time-to-hire, and source effectiveness</p>
    </header>

    <section class="stats-grid" id="reportStats"></section>

    <section class="panel">
      <h2>Source Effectiveness</h2>
      <table class="data-table" id="sourceTable">
        <thead>
          <tr>
            <th>Source</th>
            <th>Candidates</th>
            <th>Hires</th>
            <th>Drop-Off Rate</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="report-actions">
        <button class="btn-primary" onclick="exportCandidatesCSV()">Export Report</button>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/reports.js"></script>
  <script>var ACTIVE_PAGE = "reports.html";</script>
  <script src="js/sidebar.js"></script>
</body>
</html>
