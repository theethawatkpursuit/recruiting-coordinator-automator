<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecruitFlow — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1 class="logo">RecruitFlow</h1>
    <p class="tagline">Stay on top of every candidate.</p>

    <form onsubmit="handleLogin(event)">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="priya@company.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit" class="btn-primary">Log In</button>
    </form>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Placeholder: real authentication would go here
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
